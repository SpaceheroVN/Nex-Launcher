<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 130" width="220" height="130">
    <!-- Black background for the "7" -->
    <rect x="10" y="10" width="80" height="110" fill="#000000" rx="2" ry="2" />
    
    <!-- White background with black border for the "ZIP" -->
    <rect x="90" y="35" width="120" height="85" fill="#FFFFFF" stroke="#000000" stroke-width="4" rx="2" ry="2" />
    
    <!-- The "7" text -->
    <text x="50" y="105" font-family="Arial, sans-serif" font-weight="900" font-size="100" fill="#FFFFFF" text-anchor="middle">7</text>
    
    <!-- The "ZIP" text -->
    <text x="150" y="100" font-family="Arial, sans-serif" font-weight="900" font-size="65" fill="#000000" text-anchor="middle" letter-spacing="-2">ZIP</text>
</svg>
