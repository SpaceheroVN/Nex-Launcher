<!DOCTYPE html>
<html lang="vi" data-chu-de="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tiến trình</title>
  <link rel="stylesheet" href="KieuDang/GocThietKe.css">
  <link rel="stylesheet" href="KieuDang/ThanhPhan.css">
  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: transparent;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      -webkit-app-region: drag;
    }
    .HopThoai_NoiDung {
      -webkit-app-region: no-drag;
      width: 100%;
      height: 100%;
      background: var(--nen, rgba(17, 18, 20, var(--alpha-nen, 1)));
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-radius: var(--do-bo-lon, 12px);
      overflow: hidden;
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
      box-shadow: 0 0 10px rgba(0,0,0,0.5);
      border: 1px solid var(--vien);
    }
  </style>
</head>
<body>
  <div class="HopThoai_NoiDung" style="text-align: left; padding: 24px; min-width: 320px; width: 100%;">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 16px;">
      <h3 id="tien-trinh-tieu-de" style="margin: 0; font-size: 1.286rem; color: var(--chu-chinh);">Đang xử lý...</h3>
    </div>
    <div class="TienTrinh_DanhSach" id="tien-trinh-danh-sach" style="margin-bottom: 24px; max-height: 150px; overflow-y: auto;">
    </div>
    <div style="display: flex; flex-direction: column; gap: 16px; margin-top: auto;">
      <div style="width: 100%; height: 32px; background: var(--nen-tang4); border-radius: var(--do-bo); overflow: hidden; position: relative;">
        <div id="tien-trinh-thanh" style="width: 0%; height: 100%; background: var(--mau-nhan); transition: width 0.3s ease;"></div>
        <div id="tien-trinh-phan-tram" style="position: absolute; top: 0; left: 0; right: 0; bottom: 0; display: flex; justify-content: center; align-items: center; font-size: 1rem; font-weight: 600; color: white; text-shadow: 0 1px 2px rgba(0,0,0,0.5);">0%</div>
      </div>
      <div style="display: flex; gap: 12px;">
        <button class="Nut Nut--nguy-hiem" id="bao-cao-loi" style="padding: 8px 16px; border-radius: var(--do-bo); font-weight: 500; display: none; flex: 1;">Báo cáo lỗi</button>
        <button class="Nut Nut--chinh" id="dong-tien-trinh" style="padding: 8px 24px; border-radius: var(--do-bo); font-weight: 500; flex: 1;">Hủy</button>
      </div>
    </div>
  </div>
  <div id="lop-phu-modal" class="LopPhu an" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1004;"></div>
  <div id="hop-thoai-bao-cao-loi" class="HopThoai an" style="z-index: 1005; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: var(--nen-tang1); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-radius: var(--do-bo-lon); border: 1px solid var(--vien); box-shadow: 0 20px 40px rgba(0,0,0,0.3); padding: 24px; min-width: 350px; max-width: 90%; overflow: hidden;">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 16px;">
        <h3 style="margin: 0; font-size: 1.1rem; color: var(--nguy-hiem); display: flex; align-items: center; gap: 8px;">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>
          Báo cáo lỗi
        </h3>
        <button class="NutSuaNho" id="dong-bao-cao-loi-x" style="padding: 4px; border: none; background: transparent; cursor: pointer; color: var(--chu);">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
        </button>
      </div>
      <p style="font-size: 0.85rem; color: var(--chu-phu); margin-bottom: 16px;">Vui lòng sao chép nội dung dưới đây và báo cáo lỗi.</p>
      <textarea id="chi-tiet-bao-cao-loi" readonly style="width: 100%; box-sizing: border-box; height: 100px; background: var(--nen-phu); color: var(--chu-chinh); border: 1px solid var(--vien); border-radius: var(--do-bo); padding: 8px; font-family: monospace; font-size: 0.8rem; margin-bottom: 16px; resize: none;"></textarea>
      <div style="display: flex; gap: 12px; justify-content: flex-end;">
        <button class="Nut Nut--phu" id="copy-bao-cao-loi" style="display: flex; align-items: center; gap: 6px;">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
          Copy
        </button>
        <button class="Nut Nut--chinh" id="dong-bao-cao-loi-ok">OK</button>
      </div>
  </div>
  <script src="CauNoiTauri.js"></script>
  <script src="TienTrinh.js"></script>
</body>
</html>
