<!DOCTYPE html>
<html lang="vi" data-chu-de="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tiến trình</title>
  <link rel="stylesheet" href="KieuDang/GocThietKe.css">
  <link rel="stylesheet" href="KieuDang/ThanhPhan.css">
  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: transparent;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      -webkit-app-region: drag;
    }
    .HopThoai_NoiDung {
      -webkit-app-region: no-drag;
      width: 100%;
      height: 100%;
      background: var(--nen-tang0);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-radius: 7px;
      overflow: hidden;
      box-sizing: border-box;
      display: flex;
      flex-direction: column;

    }
  </style>
</head>
<body>
  <style>
    .Nut--Huy { background: var(--nen-tang3); color: var(--chu-chinh); border: none; box-shadow: 0 2px 5px rgba(0,0,0,0.15); transition: all 0.2s; }
    .Nut--Huy:hover:not(:disabled) { background: var(--nen-tang3); filter: brightness(0.85); box-shadow: 0 4px 8px rgba(0,0,0,0.2); transform: translateY(-1px); }
    
    .TienTrinh_Muc {
      background: var(--nen-tang2);
      border: 1px solid var(--vien);
      border-radius: var(--do-bo);
      margin-bottom: 8px;
      padding: 12px 16px !important;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
      transition: all var(--chuyen-dong);
    }
    .TienTrinh_Muc:last-child { margin-bottom: 0; }
    
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    .spinner {
      display: inline-block; width: 14px; height: 14px;
      border: 2px solid rgba(255,255,255,0.3); border-radius: 50%;
      border-top-color: currentColor; animation: spin 1s ease-in-out infinite;
      margin-right: 6px; vertical-align: -2px;
    }
    
    @keyframes progress-stripes { from { background-position: 40px 0; } to { background-position: 0 0; } }
    #tien-trinh-thanh {
      background-image: 
        linear-gradient(45deg, rgba(255,255,255,0.15) 25%, transparent 25%, transparent 50%, rgba(255,255,255,0.15) 50%, rgba(255,255,255,0.15) 75%, transparent 75%, transparent),
        linear-gradient(to bottom, rgba(255,255,255,0.3) 0%, rgba(255,255,255,0) 40%, rgba(0,0,0,0.1) 60%, rgba(0,0,0,0.3) 100%);
      background-size: 40px 40px, 100% 100%;
      box-shadow: inset 0 1px 2px rgba(255,255,255,0.4), inset 0 -1px 2px rgba(0,0,0,0.4);
      animation: progress-stripes 1s linear infinite;
    }
  </style>
  <div class="HopThoai_NoiDung" style="background: var(--nen-tang1); display: flex; flex-direction: column; text-align: left; padding: 24px; min-width: 320px; width: 100%; height: 100vh; box-sizing: border-box; overflow: hidden;">
    <script>
      window.onerror = function(msg, url, line, col, error) {
        let t = document.getElementById('tien-trinh-tieu-de');
        if(t) t.textContent = "ERR: " + msg + " (" + line + ":" + col + ")";
      };
      window.addEventListener('unhandledrejection', function(event) {
        let t = document.getElementById('tien-trinh-tieu-de');
        if(t) t.textContent = "Promise ERR: " + (event.reason && event.reason.message ? event.reason.message : event.reason);
      });
    </script>
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 16px;">
      <h3 id="tien-trinh-tieu-de" style="margin: 0; font-size: 1.286rem; color: var(--chu-chinh);">Đang xử lý...</h3>
      <button class="ThanhTieuDe_Nut" id="thu-nho-tien-trinh" style="border: none; cursor: pointer;" title="Thu nhỏ">
        <svg width="12" height="12" viewBox="0 0 12 12" xmlns="http://www.w3.org/2000/svg"><path fill="currentColor" d="M1 5h10v2H1z" /></svg>
      </button>
    </div>
    <div class="GlobalStages_Container" id="tien-trinh-global-stages" style="display: none; gap: 8px; margin-bottom: 16px; width: 100%;">
    </div>
    
    <div class="TienTrinh_DanhSach" id="tien-trinh-danh-sach" style="flex: 1; margin-bottom: 24px; max-height: 250px; overflow-y: auto; overflow-x: hidden;">
    </div>
    
    <div id="tien-trinh-tong-ket-don-dep" style="display: none; flex: 1; flex-direction: column; margin-bottom: 24px; overflow-y: auto; padding-right: 8px;">
        <div style="font-size: 1.05rem; font-weight: 600; color: var(--chu-chinh); margin-bottom: 8px; flex-shrink: 0;">Registry</div>
        <div id="tong-ket-registry" style="display: flex; flex-direction: column; gap: 8px; border: 1px solid var(--vien); border-radius: 4px; padding: 12px; max-height: 116px; overflow-y: auto; flex: 0 0 auto; height: fit-content;">
        </div>
        
        <div style="font-size: 1.05rem; font-weight: 600; color: var(--chu-chinh); margin-top: 16px; margin-bottom: 8px; flex-shrink: 0;">Tệp tin / Thư mục</div>
        <div id="tong-ket-tep-tin" style="display: flex; flex-direction: column; gap: 8px; border: 1px solid var(--vien); border-radius: 4px; padding: 12px; max-height: 116px; overflow-y: auto; flex: 0 0 auto; height: fit-content;">
        </div>
    </div>
    
    <div id="tien-trinh-diem-khoi-phuc" style="display: none; flex: 1; flex-direction: column; margin-bottom: 24px; max-height: 250px; overflow-y: auto; overflow-x: hidden;">
       <div id="diem-khoi-phuc-moi" style="margin-bottom: 16px;"></div>
       <div style="font-size: 0.9rem; font-weight: 600; color: var(--chu-phu); margin-bottom: 8px; display: flex; justify-content: space-between;">
           <span>Các điểm khôi phục cũ</span>
           <span id="diem-khoi-phuc-loading" style="display: none; font-size: 0.8rem; font-weight: normal;"><div class="spinner" style="width: 10px; height: 10px; border-width: 1.5px;"></div> Đang tải...</span>
       </div>
       <div id="danh-sach-diem-khoi-phuc-cu" style="display: flex; flex-direction: column; gap: 8px;"></div>
    </div>

    <div style="display: flex; align-items: center; gap: 24px; padding-top: 16px; margin-top: auto;">
      <div id="tien-trinh-wrapper" style="flex: 1; height: 32px; background: rgba(0,0,0,0.3); border-radius: var(--do-bo); overflow: hidden; position: relative; box-shadow: inset 0 3px 8px rgba(0,0,0,0.6), inset 0 1px 2px rgba(0,0,0,0.4), 0 1px 1px rgba(255,255,255,0.05); border: 1px solid rgba(0,0,0,0.8); transition: all 0.3s ease;">
        <div id="tien-trinh-thanh" style="width: 0%; height: 100%; background-color: var(--mau-nhan); box-sizing: border-box;"></div>
        <div id="tien-trinh-phan-tram" style="position: absolute; top: 0; left: 0; right: 0; bottom: 0; display: flex; justify-content: center; align-items: center; font-size: 1rem; font-weight: 600; color: white; text-shadow: 0 1px 4px rgba(0,0,0,0.9), 0 0 2px rgba(0,0,0,0.9);">0%</div>
      </div>
      <button class="Nut Nut--nguy-hiem" id="bao-cao-loi" style="padding: 8px 16px; border-radius: var(--do-bo); font-weight: 500; display: none;">Báo cáo lỗi</button>
      <button class="Nut Nut--Huy" id="dong-tien-trinh" data-is-cancel="true" style="padding: 8px 32px; border-radius: var(--do-bo); font-weight: 500; min-width: 120px;">Hủy</button>
      <button class="Nut Nut--chinh" id="tiep-theo-tien-trinh" style="display: none; padding: 8px 32px; border-radius: var(--do-bo); font-weight: 500; min-width: 120px; background: var(--mau-nhan); color: #fff; border: none;">Tiếp theo</button>
    </div>
  </div>
  <div id="lop-phu-modal" class="LopPhu an" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1004;"></div>
  <div id="hop-thoai-bao-cao-loi" class="HopThoai an" style="z-index: 1005; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: var(--nen-tang1); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-radius: var(--do-bo-lon); border: 1px solid var(--vien); box-shadow: 0 20px 40px rgba(0,0,0,0.3); padding: 24px; min-width: 350px; max-width: 90%; overflow: hidden;">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 16px;">
        <h3 style="margin: 0; font-size: 1.1rem; color: var(--nguy-hiem); display: flex; align-items: center; gap: 8px;">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>
          Báo cáo lỗi
        </h3>
        <button class="NutSuaNho" id="dong-bao-cao-loi-x" style="padding: 4px; border: none; background: transparent; cursor: pointer; color: var(--chu);">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
        </button>
      </div>
      <p style="font-size: 0.85rem; color: var(--chu-phu); margin-bottom: 16px;">Vui lòng sao chép nội dung dưới đây và báo cáo lỗi.</p>
      <textarea id="chi-tiet-bao-cao-loi" readonly style="width: 100%; box-sizing: border-box; height: 100px; background: var(--nen-phu); color: var(--chu-chinh); border: 1px solid var(--vien); border-radius: var(--do-bo); padding: 8px; font-family: monospace; font-size: 0.8rem; margin-bottom: 16px; resize: none;"></textarea>
      <div style="display: flex; gap: 12px; justify-content: flex-end;">
        <button class="Nut Nut--phu" id="copy-bao-cao-loi" style="display: flex; align-items: center; gap: 6px;">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
          Copy
        </button>
        <button class="Nut Nut--chinh" id="dong-bao-cao-loi-ok">OK</button>
      </div>
  </div>
  <script src="CauNoiTauri.js"></script>
  <script src="TienTrinh.js"></script>
</body>
</html>
