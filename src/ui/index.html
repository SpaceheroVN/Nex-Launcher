          <button class="TieuDeCot_Cot TieuDeCot_Cot--ten sap-xep" data-sap-xep="name"><span data-i18n="header_name">Tên

    <option value="Utilities"></option>

    <option value="Compression"></option>

          <input type="text" id="them-app-ten" spellcheck="false" placeholder="VD: Zalo" data-i18n-ph="add_app_name_ph" style="width: 100%; box-sizing: border-box; border: 1px solid var(--vien); padding: 12px 14px; border-radius: 8px; background: var(--nen-phu); color: var(--chu-chinh); font-size: 14px; transition: border-color 0.2s;" onfocus="this.style.borderColor='var(--mau-chinh)'" onblur="this.style.borderColor='var(--vien)'">
        </div>
        <div style="flex: 1; position: relative;">
          <label style="display:block; margin-bottom: 8px; font-size: 13px; font-weight: 500; color: var(--chu-chinh);" data-i18n="add_app_category">Thể loại</label>
          <input type="text" id="them-app-loai" spellcheck="false" placeholder="Tự nhập hoặc chọn..." data-i18n-ph="add_app_category_ph" autocomplete="off" style="width: 100%; box-sizing: border-box; border: 1px solid var(--vien); padding: 12px 14px; border-radius: 8px; background: var(--nen-phu); color: var(--chu-chinh); font-size: 14px; transition: border-color 0.2s;" onfocus="this.style.borderColor='var(--mau-chinh)'; document.getElementById('dropdown-loai').classList.remove('an');" onblur="this.style.borderColor='var(--vien)'; setTimeout(()=>document.getElementById('dropdown-loai')?.classList.add('an'), 200);">

            <div class="CustomSelect_Item" style="padding: 10px 14px; font-size: 14px; cursor: pointer; border-bottom: 1px solid var(--vien);" onmousedown="document.getElementById('them-app-loai').value='Web Browsers'">Web Browsers</div>
            <div class="CustomSelect_Item" style="padding: 10px 14px; font-size: 14px; cursor: pointer; border-bottom: 1px solid var(--vien);" onmousedown="document.getElementById('them-app-loai').value='Developer Tools'">Developer Tools</div>
            <div class="CustomSelect_Item" style="padding: 10px 14px; font-size: 14px; cursor: pointer; border-bottom: 1px solid var(--vien);" onmousedown="document.getElementById('them-app-loai').value='Media'">Media</div>
            <div class="CustomSelect_Item" style="padding: 10px 14px; font-size: 14px; cursor: pointer; border-bottom: 1px solid var(--vien);" onmousedown="document.getElementById('them-app-loai').value='Games'">Games</div>
            <div class="CustomSelect_Item" style="padding: 10px 14px; font-size: 14px; cursor: pointer; border-bottom: 1px solid var(--vien);" onmousedown="document.getElementById('them-app-loai').value='Utilities'">Utilities</div>
            <div class="CustomSelect_Item" style="padding: 10px 14px; font-size: 14px; cursor: pointer; border-bottom: 1px solid var(--vien);" onmousedown="document.getElementById('them-app-loai').value='Messaging'">Messaging</div>
            <div class="CustomSelect_Item" style="padding: 10px 14px; font-size: 14px; cursor: pointer;" onmousedown="document.getElementById('them-app-loai').value='Compression'">Compression</div>

        </div>
      </div>

      <div style="margin-bottom: 24px;">
        <label style="display:block; margin-bottom: 8px; font-size: 13px; font-weight: 500; color: var(--chu-chinh);" data-i18n="add_app_source">Hình thức cài đặt</label>
        <div style="display: flex; gap: 8px; align-items: stretch;">
          <div style="position: relative; width: 140px;" tabindex="0" onfocus="document.getElementById('dropdown-kieu').classList.remove('an'); this.style.borderColor='var(--mau-chinh)'" onblur="setTimeout(()=>document.getElementById('dropdown-kieu')?.classList.add('an'), 200); this.style.borderColor='var(--vien)'">
            <div id="them-app-kieu-nguon" data-value="Winget" style="border: 1px solid var(--vien); padding: 12px 14px; border-radius: 8px; background: var(--nen-phu); color: var(--chu-chinh); font-size: 14px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; height: 100%; box-sizing: border-box;">
              <span class="NhanText">Winget</span>
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"></polyline></svg>
            </div>
            <div id="dropdown-kieu" class="CustomSelect_Dropdown an" style="position: absolute; top: 100%; left: 0; right: 0; background: var(--nen-tang2, var(--nen-chinh)); border: 1px solid var(--vien); border-radius: 8px; margin-top: 4px; box-shadow: 0 8px 24px rgba(0,0,0,0.25); z-index: 10;">
              <div class="CustomSelect_Item" style="padding: 10px 14px; font-size: 14px; cursor: pointer; border-bottom: 1px solid var(--vien);" onmousedown="let el=document.getElementById('them-app-kieu-nguon'); el.dataset.value='Winget'; el.querySelector('.NhanText').textContent='Winget'; document.getElementById('them-app-id').placeholder=t('add_app_id_ph'); document.getElementById('btn-tim-winget').style.display='flex';">Winget</div>
              <div class="CustomSelect_Item" style="padding: 10px 14px; font-size: 14px; cursor: pointer; border-bottom: 1px solid var(--vien);" onmousedown="let el=document.getElementById('them-app-kieu-nguon'); el.dataset.value='Link'; el.querySelector('.NhanText').textContent='Link (.exe/.msi)'; document.getElementById('them-app-id').placeholder='https://...'; document.getElementById('btn-tim-winget').style.display='none';">Link (.exe/.msi)</div>
              <div class="CustomSelect_Item" style="padding: 10px 14px; font-size: 14px; cursor: pointer;" onmousedown="let el=document.getElementById('them-app-kieu-nguon'); el.dataset.value='Store'; el.querySelector('.NhanText').textContent='MS Store'; document.getElementById('them-app-id').placeholder='Nhập ID Store'; document.getElementById('btn-tim-winget').style.display='none';">MS Store</div>
            </div>
          </div>
          <input type="text" id="them-app-id" spellcheck="false" placeholder="Nhập ID / Link / Từ khóa tìm kiếm" data-i18n-ph="add_app_id_ph" style="flex: 1; border: 1px solid var(--vien); padding: 12px 14px; border-radius: 8px; background: var(--nen-phu); color: var(--chu-chinh); font-size: 14px; transition: border-color 0.2s; min-width: 0;" onfocus="this.style.borderColor='var(--mau-chinh)'" onblur="this.style.borderColor='var(--vien)'">
          <button id="btn-tim-winget" class="Nut Nut--chinh" data-i18n-title="add_app_search_title" style="padding: 0 16px; border-radius: 8px; display: flex; align-items: center; justify-content: center;" title="Tìm kiếm trên Winget">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
          </button>
        </div>
      </div>

      <div style="display: flex; gap: 12px; justify-content: flex-end; margin-top: 32px;">
        <button class="Nut" id="dong-them-app" data-i18n="add_app_cancel" style="background: var(--nen-phu); color: var(--chu-chinh); border: 1px solid var(--vien); padding: 10px 20px; border-radius: 8px; font-weight: 500;">Hủy</button>
        <button class="Nut Nut--chinh" id="luu-them-app" style="padding: 10px 24px; border-radius: 8px; font-weight: 500; display: flex; align-items: center; gap: 6px;">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5v14"></path></svg>
          <span data-i18n="add_app_add">Thêm</span>
        </button>
      </div>
    </div>
  </div>

  <div id="hop-thoai-cai-dat" class="HopThoai an">
    <div class="HopThoai_NoiDung HopThoai_NoiDung--rong">
      <div class="CaiDat_ThanhBen">
        <div class="CaiDat_TieuDe" data-i18n="menu_settings">Cài đặt</div>
        <div id="caidat-menu"></div>
      </div>
      <div class="CaiDat_NoiDung">
        <div class="CaiDat_TieuDeChia">
          <button class="CaiDat_NutDongX" id="dong-cai-dat">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="18" y1="6" x2="6" y2="18"></line>
              <line x1="6" y1="6" x2="18" y2="18"></line>
            </svg>
          </button>
        </div>
        <div class="CaiDat_CuonNoiDung" id="noi-dung-cai-dat"></div>
        <div class="CaiDat_ThanhDuoi">
          <button class="Nut Nut--phu" id="caidat-dat-lai" data-i18n="reset_btn">Đặt lại</button>
          <div style="display:flex;gap:8px;">
            <button class="Nut Nut--phu" id="caidat-huy" data-i18n="cancel_btn">Hủy</button>
            <button class="Nut Nut--chinh" id="caidat-luu" data-i18n="save_btn">Lưu</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div id="hop-thoai-tro-giup" class="HopThoai an" style="z-index: 1001;">
    <div class="HopThoai_NoiDung" style="text-align: left; padding: 24px; min-width: 320px; max-width: 400px;">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 16px;">
        <h3 id="tro-giup-tieu-de" style="margin: 0; font-size: 18px; color: var(--chu);">Trợ giúp</h3>
        <button class="CaiDat_NutDongX" onclick="BatTatHopThoai('hop-thoai-tro-giup', false)"
          style="position:static; margin:0;">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="18" y1="6" x2="6" y2="18"></line>
            <line x1="6" y1="6" x2="18" y2="18"></line>
          </svg>
        </button>
      </div>
      <div id="tro-giup-noi-dung"
        style="font-size: 14px; color: var(--chu-phu); line-height: 1.6; margin-bottom: 24px;"></div>
      <button class="Nut Nut--chinh HopThoai_NutDong" onclick="BatTatHopThoai('hop-thoai-tro-giup', false)"
        style="width: 100%;">OK</button>
    </div>
  </div>

  <div id="vung-thong-bao" class="VungThongBao"></div>
  <script src="TaiNguyen/Languages.js"></script>
  <script src="KhoiChay.js"></script>
</body>

</html>
